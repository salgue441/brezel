name: CI Pipeline

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Allow manual triggering

env:
  CI: "ON"

jobs:
  docker-build:
    name: Build and Test with Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Install docker-compose if not available
      - name: Install Docker Compose
        run: |
          if ! command -v docker compose &> /dev/null; then
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.18.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            docker-compose --version
          else
            echo "Docker Compose is already installed"
            docker compose version
          fi

      - name: Build Docker image
        run: docker compose build

      - name: Build Release Configuration
        run: |
          docker compose run --rm brezel-dev /bin/bash -c "rm -rf build-release && mkdir -p build-release && cd build-release && \
            cmake .. -DCMAKE_BUILD_TYPE=Release -DCI=ON && \
            cmake --build . --parallel $(nproc)"

      - name: Run Release Tests
        run: |
          docker compose run --rm brezel-dev /bin/bash -c "cd build-release && ctest --output-on-failure"

      - name: Build Debug Configuration with Sanitizers
        run: |
          docker compose run --rm brezel-dev /bin/bash -c "rm -rf build-debug && mkdir -p build-debug && cd build-debug && \
            cmake .. -DCMAKE_BUILD_TYPE=Debug -DENABLE_SANITIZER_ADDRESS=ON -DENABLE_SANITIZER_UNDEFINED_BEHAVIOR=ON -DCI=ON && \
            cmake --build . --parallel $(nproc)"

      - name: Run Debug Tests with Sanitizers
        run: |
          docker compose run --rm brezel-dev /bin/bash -c "cd build-debug && ctest --output-on-failure"

  native-builds:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: "Ubuntu GCC",
              os: ubuntu-latest,
              compiler: "gcc",
              build_type: "Release",
            }
          - {
              name: "macOS Clang",
              os: macos-latest,
              compiler: "clang",
              build_type: "Release",
            }
          - {
              name: "Windows MSVC",
              os: windows-latest,
              compiler: "msvc",
              build_type: "Release",
            }

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Configure Dependencies (Ubuntu)
        if: matrix.config.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libfmt-dev libblas-dev liblapack-dev libopenblas-dev libomp-dev

      - name: Configure Dependencies (macOS)
        if: matrix.config.os == 'macos-latest'
        run: |
          brew install cmake fmt openblas libomp

      - name: Configure Dependencies (Windows)
        if: matrix.config.os == 'windows-latest'
        run: |
          # Using vcpkg for Windows dependencies
          git clone https://github.com/Microsoft/vcpkg.git
          cd vcpkg
          ./bootstrap-vcpkg.bat
          ./vcpkg install fmt:x64-windows openblas:x64-windows

      - name: Configure CMake (Unix)
        if: matrix.config.os != 'windows-latest'
        run: |
          rm -rf build
          mkdir -p build
          cd build
          if [ "${{ matrix.config.os }}" == "macos-latest" ]; then
            # Disable OpenMP on macOS to avoid configuration issues
            cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} -DBREZEL_BUILD_TESTS=ON -DBREZEL_USE_OPENMP=OFF -DCI=ON
          else
            cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} -DBREZEL_BUILD_TESTS=ON -DCI=ON
          fi

      - name: Configure CMake (Windows)
        if: matrix.config.os == 'windows-latest'
        run: |
          if (Test-Path -Path build) { Remove-Item -Recurse -Force build }
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.config.build_type }} -DBREZEL_BUILD_TESTS=ON -DCMAKE_TOOLCHAIN_FILE=../vcpkg/scripts/buildsystems/vcpkg.cmake -DCI=ON

      - name: Build
        run: |
          cd build
          cmake --build . --config ${{ matrix.config.build_type }} --parallel 4

      - name: Run Tests
        run: |
          cd build
          ctest -C ${{ matrix.config.build_type }} --output-on-failure

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install Docker Compose
        run: |
          if ! command -v docker compose &> /dev/null; then
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.18.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            docker-compose --version
          else
            echo "Docker Compose is already installed"
            docker compose version
          fi

      - name: Build Docker image
        run: docker compose build

      - name: Run Clang-Tidy and Cppcheck
        run: |
          docker compose run --rm brezel-dev bash -c "rm -rf build-analysis && mkdir -p build-analysis && cd build-analysis && \
            cmake .. -DCMAKE_BUILD_TYPE=Debug -DENABLE_CLANG_TIDY=ON -DENABLE_CPPCHECK=ON -DCI=ON && \
            cmake --build . --parallel 2"

  documentation:
    name: Build Documentation
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Install Docker Compose
        run: |
          if ! command -v docker compose &> /dev/null; then
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.18.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
            docker-compose --version
          else
            echo "Docker Compose is already installed"
            docker compose version
          fi

      - name: Build Docker image
        run: docker compose build

      - name: Build Documentation
        run: |
          docker compose run --rm brezel-dev bash -c "rm -rf build-docs && mkdir -p build-docs && cd build-docs && \
            cmake .. -DBREZEL_BUILD_DOCS=ON -DCI=ON && \
            cmake --build . --target docs"

      - name: Archive Documentation
        uses: actions/upload-artifact@v2
        with:
          name: documentation
          path: build-docs/docs/html/

      - name: Deploy Documentation to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build-docs/docs/html
